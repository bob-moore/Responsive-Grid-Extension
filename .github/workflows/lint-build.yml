name: Lint and Build

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    lint-build:
        name: ESLint, Stylelint, and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint JavaScript
              run: npm run lint:js

            - name: Lint CSS
              run: npm run lint:css

            - name: Compile
              run: npm run compile
    php:
        name: PHPUnit, PHPStan, and PHPCS
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  tools: composer

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist

            - name: PHPCodeSniffer
              run: composer phpsniff

            - name: Static Analysis
              run: composer phpstan

            - name: PHPUnit
              run: composer test
