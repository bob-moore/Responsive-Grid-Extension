name: Lint and Build

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    lint-build:
        name: Lint and Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint JavaScript
              run: npm run lint:js

            - name: Lint CSS
              run: npm run lint:css

            - name: Compile
              run: npm run compile
